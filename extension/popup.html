<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Maruko</h1>

  <section id="pairing-section" hidden>
    <p>Paste the pairing code shown in the Maruko app:</p>
    <div class="row">
      <input id="pairing-input" type="text" placeholder="38765-…" spellcheck="false">
      <button id="pairing-save">Save</button>
    </div>
  </section>

  <section id="main-section" hidden>
    <button id="send" class="primary">Send Bookmarks</button>
    <p id="hint" class="hint">Sends this profile's bookmarks and recent history to Maruko for analysis. Nothing changes until you confirm in the app.</p>
  </section>

  <p id="status" class="status"></p>
  <p id="keep-open" class="warning" hidden>Applying changes — keep this popup open.</p>

  <footer>
    <a id="repair" href="#">Re-pair with Maruko</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
